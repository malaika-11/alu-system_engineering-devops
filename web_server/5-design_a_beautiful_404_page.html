<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Lost in Space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 40px;
        }

        h1 {
            font-size: 120px;
            margin-bottom: 20px;
            animation: float 3s infinite ease-in-out;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        a {
            text-decoration: none;
            color: white;
            background: #ff6b6b;
            padding: 15px 30px;
            border-radius: 30px;
            transition: 0.3s;
        }

        a:hover {
            background: #ff4757;
            transform: scale(1.05);
        }

        .planet {
            font-size: 60px;
            margin-bottom: 20px;
        }

        @keyframes float {
            50% {
                transform: translateY(-20px);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="planet">🪐</div>

        <h1>404</h1>

        <h2>Ceci n'est pas une page</h2>

        <p>
            Looks like you traveled too far into the internet universe.
            The page you are searching for has disappeared into space.
        </p>

        <a href="/">Return Home</a>
    </div>
</body>
</html>
